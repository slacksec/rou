<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Next</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: white;
    }
    #playBtn {
      position: fixed;
      top: 10px;
      left: 10px;
      font-size: 2rem;
      padding: 12px 24px;
      z-index: 10;
    }
    #playerContainer {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }
    iframe {
      width: 80vw;
      height: 45vw;
      max-width: 960px;
      max-height: 540px;
      border: none;
      display: none;
    }
    .hall-of-fame-link {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 3px solid rgba(255, 255, 255, 0.86);
      border-radius: 50%;
      background: rgba(18, 18, 22, 0.68);
      text-decoration: none;
      font-size: 1.85rem;
      line-height: 1;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(5px);
      transition: transform 150ms ease, background 150ms ease;
    }
    .hall-of-fame-link:hover,
    .hall-of-fame-link:focus-visible {
      background: rgba(18, 18, 22, 0.86);
      transform: translateY(-3px) scale(1.04);
      outline: none;
    }
  </style>
</head>
<body>
  <button id="playBtn">▶ Rick Astley Video Tape</button>
  <div id="playerContainer">
    <iframe id="player" allow="autoplay"></iframe>
  </div>
  <a class="hall-of-fame-link" href="hall of fame.html" aria-label="Open Hall of Fame">🎞️</a>
  <footer style="position: fixed; bottom: 10px; width: 100%; text-align: center; font-size: 1rem;">
    Made with ❤️ by Calvin &copy; 2025
  </footer>

  <script>
    const playlist = [
      "dQw4w9WgXcQ",
      "yPYZpwSpKmA",
      "AC3Ejf7vPEY",
      "cc91EfoBh8A",
      "C2xel6q0yao",
      "BeyEGebJ1l4",
      "eYuUAGXN0KM",
      "DqZS89jFCFg",
      "yBwD4iYcWC4",
      "5o7WEv5Q5ZE"
    ];

    document.getElementById('playBtn').onclick = () => {
      const randomVideo = playlist[Math.floor(Math.random() * playlist.length)];
      const iframe = document.getElementById('player');
      iframe.src = `https://www.youtube.com/embed/${randomVideo}?autoplay=1`;
      iframe.style.display = 'block';
    };
  </script>
</body>
</html>
